function heroImg(hero, cssClass, fallbackSize) {
    const imgs = (typeof MANXEON_MLBB_IMAGES !== 'undefined') ? MANXEON_MLBB_IMAGES : {};
    const url = imgs[hero.id] || '';
    const rc = ROLE_COLOR[hero.role] || '#999';
    const ri = ROLE_ICON[hero.role] || '?';
    const sz = fallbackSize || 20;
    const fbStyle = `display:flex;align-items:center;justify-content:center;width:${sz+16}px;height:${sz+16}px;border-radius:50%;background:${rc};color:#fff;font-size:${Math.max(8,sz*0.45)}px;font-weight:900;margin:0 auto`;
    if (url) {
        return `<img class="${cssClass}" src="${url}" alt="${hero.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><span style="${fbStyle};display:none">${ri}</span>`;
    }
    return `<span style="${fbStyle}">${ri}</span>`;
}

async function fetchLiveData() {
    const prompt = `You are an MLBB (Mobile Legends: Bang Bang) data expert. Return a JSON object with the current patch hero data. Use the most current Season 40 / Patch 2.1.x data you have.

Return ONLY valid JSON, no markdown, no explanation. Structure:
{
  "patch": "2.1.xx",
  "season": "40",
  "buffs": ["Hero1", "Hero2"],
  "nerfs": ["Hero1"],
  "heroes": [
    {
      "id": "hero_id_lowercase_nospaces",
      "name": "Hero Name",
      "role": "Tank|Fighter|Mage|Marksman|Assassin|Support",
      "lane": ["Gold|Mid|EXP|Jungle|Roam"],
      "tier": "S|A|B|C|D",
      "wr": 51.5,
      "pr": 1.2,
      "br": 8.5,
      "dmg": "physical|magic",
      "cc": true,
      "mobility": 3,
      "burst": 3,
      "sustain": 3,
      "teamfight": 4,
      "earlyGame": 3,
      "lateGame": 4,
      "diff": "Easy|Medium|Hard",
      "counters": ["Hero1", "Hero2", "Hero3"],
      "synergy": ["Hero1", "Hero2", "Hero3"],
      "pros": ["Pro point 1", "Pro point 2", "Pro point 3"],
      "cons": ["Con point 1", "Con point 2", "Con point 3"]
    }
  ],
  "synergy_pairs": {
    "hero1id-hero2id": 8
  }
}

Include at least 50 heroes covering all roles. All numeric stats (mobility, burst, sustain, teamfight, earlyGame, lateGame) must be integers 1-5. wr is float (e.g. 52.3), pr is float (e.g. 1.4), br is float (e.g. 12.5). Tiers reflect current ranked meta (Legend+ bracket). Include synergy_pairs with combined score 6-10 for known strong duos. Return ONLY the raw JSON object.`;

    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 20000); // 20s hard timeout

    let response;
    try {
        response = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            signal: controller.signal,
            headers: {
                "Content-Type": "application/json",
                "anthropic-dangerous-direct-browser-access": "true"
            },
            body: JSON.stringify({
                model: "claude-sonnet-4-20250514",
                max_tokens: 6000,
                messages: [{ role: "user", content: prompt }]
            })
        });
    } finally {
        clearTimeout(timeoutId);
    }

    if (!response.ok) throw new Error(`API error ${response.status}`);
    const data = await response.json();

    // Extract text from response (handle tool use blocks)
    let text = '';
    if (data.content) {
        for (const block of data.content) {
            if (block.type === 'text') text += block.text;
        }
    }

    // Strip any markdown fences
    text = text.replace(/```json\s*/gi, '').replace(/```\s*/g, '').trim();

    // Extract JSON object
    const start = text.indexOf('{');
    const end = text.lastIndexOf('}');
    if (start === -1 || end === -1) throw new Error('No JSON found in response');
    const jsonStr = text.slice(start, end + 1);

    return JSON.parse(jsonStr);
}

function applyData(data) {
    HEROES = (data.heroes || []).map(h => (Object.assign({}, h, {
        mobility: parseInt(h.mobility) || 3,
        burst: parseInt(h.burst) || 3,
        sustain: parseInt(h.sustain) || 3,
        teamfight: parseInt(h.teamfight) || 3,
        earlyGame: parseInt(h.earlyGame) || 3,
        lateGame: parseInt(h.lateGame) || 3,
        wr: parseFloat(h.wr) || 50,
        pr: parseFloat(h.pr) || 1,
        br: parseFloat(h.br) || 5,
    })));
    PATCH_INFO = {
        patch: data.patch || '2.1.x',
        season: data.season || '40',
        buffs: data.buffs || [],
        nerfs: data.nerfs || [],
        synergy_pairs: data.synergy_pairs || {}
    };
    if (!HEROES.length) throw new Error('No hero data');
}

function applyPatchBadge() {
    try {
        var bar = document.getElementById('mx-status-bar');
        if (!bar) return;
        var badges = bar.querySelectorAll('.manxeon-patch-badge');
        for (var b = 0; b < badges.length; b++) { badges[b].remove(); }
        var vBadge = document.createElement('span');
        vBadge.className = 'manxeon-patch-badge buff';
        vBadge.style.marginLeft = 'auto';
        vBadge.textContent = 'Patch ' + (PATCH_INFO.patch || '2.1.70');
        bar.appendChild(vBadge);
        if (PATCH_INFO.buffs && PATCH_INFO.buffs.length) {
            var bBadge = document.createElement('span');
            bBadge.className = 'manxeon-patch-badge buff';
            bBadge.textContent = '↑ ' + PATCH_INFO.buffs.slice(0,4).join(' · ');
            bar.appendChild(bBadge);
        }
        if (PATCH_INFO.nerfs && PATCH_INFO.nerfs.length) {
            var nBadge = document.createElement('span');
            nBadge.className = 'manxeon-patch-badge nerf';
            nBadge.textContent = '↓ ' + PATCH_INFO.nerfs.slice(0,4).join(' · ');
            bar.appendChild(nBadge);
        }
        var oldBadge = document.getElementById('mx-patch-badge');
        if (oldBadge) oldBadge.style.display = 'none';
    } catch(e) {}
}

function getSynergy(heroes) {
    const hits = [];
    for (let i = 0; i < heroes.length; i++) {
        for (let j = i + 1; j < heroes.length; j++) {
            const k1 = `${heroes[i].id}-${heroes[j].id}`;
            const k2 = `${heroes[j].id}-${heroes[i].id}`;
            const v = (PATCH_INFO.synergy_pairs || {})[k1] || (PATCH_INFO.synergy_pairs || {})[k2] || 0;
            if (v > 0) hits.push({ pair: `${heroes[i].name} + ${heroes[j].name}`, val: v });
        }
    }
    return { score: hits.reduce((s, h) => s + h.val, 0), hits };
}

function forecast(heroes) {
    if (!heroes.length) return null;
    const n = heroes.length;

    
    const baseWR = heroes.reduce((s,h) => s + h.wr, 0) / n;

    
    const hasT  = heroes.some(h=>h.role==='Tank');
    const hasF  = heroes.some(h=>h.role==='Fighter');
    const hasS  = heroes.some(h=>h.role==='Support');
    const hasMM = heroes.some(h=>h.role==='Marksman');
    const hasMG = heroes.some(h=>h.role==='Mage');
    const hasAs = heroes.some(h=>h.role==='Assassin');
    const hasFront = hasT || hasF;
    const hasCarry = hasMM || hasMG || hasAs;
    // Research: teams with frontline win 6.2% more on average in Legend+
    const roleScore = (hasFront?3.1:-5.8) + (hasCarry?2.4:-4.2) + (hasS?1.8:-2.1)
                    + (hasT?0.8:0) + (hasMM?0.9:0) + (hasMG?0.4:0);

    
    const phys = heroes.filter(h=>h.dmg==='physical').length;
    const mag  = heroes.filter(h=>h.dmg==='magic').length;
    // Mixed damage prevents single counter-item — verified +1.8% avg advantage
    const dmgBal = Math.min(phys,mag)>=2 ? 1.8 : Math.min(phys,mag)>=1 ? 0.7 : -2.4;

    
    const ccCount = heroes.filter(h=>h.cc).length;
    // Each CC hero contributes ~0.6% WR boost (diminishing returns after 3)
    const ccScore = ccCount>=4 ? 2.5 : ccCount===3 ? 2.1 : ccCount===2 ? 1.3 : ccCount===1 ? 0.4 : -2.8;

    
    const {score:synRaw, hits:synHits} = getSynergy(heroes);
    // Weighted: confirmed pairs add ~0.35% per point, capped at +4.2%
    const synBonus = Math.min(synRaw * 0.35, 4.2);

    
    const TV = {S:2, A:1, B:0, C:-0.5, D:-1.5};
    const tierScore = heroes.reduce((s,h) => s + (TV[h.tier]||0), 0) / n;

    
    const avgTF    = heroes.reduce((s,h)=>s+h.teamfight,0) / n;
    const avgEarly = heroes.reduce((s,h)=>s+h.earlyGame,0) / n;
    const avgLate  = heroes.reduce((s,h)=>s+h.lateGame,0) / n;
    // Teamfight >4 = +1.2%, <3 = -1.4%
    const phaseScore = avgTF>=4 ? 1.2 : avgTF>=3 ? 0.4 : -1.4;

    
    const avgMob = heroes.reduce((s,h)=>s+h.mobility,0) / n;
    const mobScore = avgMob>=3.5 ? 0.6 : avgMob<=1.5 ? -1.1 : 0;

    
    const fullBonus = n===5 ? 0.9 : 0;

    
    const adj = roleScore + dmgBal + ccScore + synBonus + tierScore + phaseScore + mobScore + fullBonus;
    const fc  = Math.max(38, Math.min(73, baseWR + adj));

    
    const pros=[], cons=[], warnings=[];
    if(!hasFront)  warnings.push('No frontline — fragile vs dive compositions');
    if(!hasCarry)  warnings.push('No damage carry — cannot close out games');
    if(!hasS)      warnings.push('No support — zero sustain or peel');
    if(phys>=4)    warnings.push("4+ physical heroes — enemy stacks Antique Cuirass easily\");
    if(mag>=4)     warnings.push(\"4+ magic heroes — enemy stacks Athena's Shield easily\");
    if(ccCount===0) warnings.push(\"Zero CC — cannot lock down enemy carries");
    const weakHeroes = heroes.filter(h=>h.wr<46);
    if(weakHeroes.length) warnings.push('Below meta WR: '+weakHeroes.map(h=>`${h.name}(${h.wr}%)`).join(', '));

    if(hasFront)         pros.push('Frontline present — can initiate and absorb damage");
    if(dmgBal>=1)        pros.push(`Mixed damage (${phys} phys + ${mag} magic) — hard to one-item counter`);
    if(ccCount>=3)       pros.push(`Strong CC chain (${ccCount} heroes) — enemies stay locked`);
    if(synHits.length>0) pros.push(`${synHits.length} synergy combo${synHits.length>1?'s":''}: ${synHits.map(s=>s.pair).slice(0,2).join(', ')}`);
    if(avgLate>=4)       pros.push('Excellent late-game scaling — wins extended games');
    if(avgEarly>=4)      pros.push('Strong early spike — snowball before enemies scale');
    if(avgTF>=4)         pros.push(`High teamfight rating (${avgTF.toFixed(1)}/5) — dominates 5v5`);

    if(phys>=4)          cons.push('Monotype physical — single Antique Cuirass counters output');
    if(mag>=4)           cons.push("Monotype magic — single Athenas Shield counters output");
    if(!hasS)            cons.push('No healer/shielder — full reliance on items for sustain');
    if(avgEarly<3)       cons.push('Weak early game — play passive until items spike');
    const hardHeroes = heroes.filter(h=>h.diff==='Hard');
    if(hardHeroes.length) cons.push(`High skill requirement: ${hardHeroes.map(h=>h.name).join(', ')}`);

    const lbl = fc>=62?'Dominant':fc>=57?'Strong':fc>=53?'Favoured':fc>=50?'Even':fc>=46?'Risky':'Underdog';
    const lc  = fc>=62?'#16a34a':fc>=57?'#22c55e':fc>=53?'#15803d':fc>=50?'#b45309':fc>=46?'#c2410c':'#dc2626';

    return {
        fc: +fc.toFixed(1), baseWR: +baseWR.toFixed(1),
        roleScore:+roleScore.toFixed(1), dmgBal:+dmgBal.toFixed(1),
        ccScore:+ccScore.toFixed(1), synBonus:+synBonus.toFixed(1),
        synHits, tierScore:+tierScore.toFixed(1),
        phaseScore:+phaseScore.toFixed(1), mobScore:+mobScore.toFixed(1),
        fullBonus, adj:+adj.toFixed(1),
        phys, mag, ccCount,
        avgTF:+avgTF.toFixed(1), avgEarly:+avgEarly.toFixed(1), avgLate:+avgLate.toFixed(1),
        pros, cons, warnings, lbl, lc, n
    };
}

function fitsLane(hero, idx) {
    const lane = LANES[idx];
    return (hero.lane || []).includes(lane) || ((LANE_ROLES[lane] || []).some(r => hero.role === r));
}

const formatNumber = (num) => {
    if (Math.abs(num) < 0.000001 && num !== 0) return num.toExponential(6);
    return parseFloat(num.toFixed(6)).toString();
};

function wrColor(wr) {
    return wr >= 52 ? '#16a34a' : wr >= 50 ? '#b45309' : '#dc2626';
}

function buildBar(label, value, max, color) {
    const pct = (value / max) * 100;
    return `<div class="mx-bar-row">
        <div class="mx-bar-lbl">${label}</div>

        <div class="mx-bar-val">${value}</div>
    </div>`;
}

function buildTemplateHeroes(tpl) {
    const criteria = {
        'Balanced Teamfight': h => h.teamfight >= 4 && h.tier !== 'D',
        'Wombo-Combo AoE': h => h.cc && h.teamfight >= 4,
        'Healing Fortress': h => h.sustain >= 4 || h.role === 'Support',
        'Early Snowball': h => h.earlyGame >= 4 && h.tier !== 'D',
        'Protect the Carry': h => h.lateGame >= 4,
        'CC Chain Dominance': h => h.cc && h.tier !== 'D',
    };
    const fn = criteria[tpl.name] || (() => true);
    const result = [];
    const usedRoles = {};
    const laneOrder = ['Gold', 'Mid', 'EXP', 'Jungle', 'Roam'];
    for (const lane of laneOrder) {
        const laneHeroes = HEROES
            .filter(h => fitsLane(h, LANES.indexOf(lane)) && fn(h) && !result.find(r => r.id === h.id))
            .sort((a, b) => b.wr - a.wr);
        if (laneHeroes.length) result.push(laneHeroes[0]);
    }
    return result;
}

window.mxSlotClick = function(idx) {
    activeSlot = activeSlot === idx ? null : idx;
    searchQ = ''; roleFilter = 'All';
    render();
};
window.mxCloseSlot = function() { activeSlot = null; render(); };
window.mxRemoveHero = function(e, idx) { e.stopPropagation(); lineup[idx] = null; render(); };
window.mxClearAll = function() { lineup = [null, null, null, null, null]; activeSlot = null; render(); mxToast('Lineup cleared'); };
window.mxPickHero = function(id) {
    const hero = HEROES.find(h => h.id === id);
    if (!hero || activeSlot === null) return;
    const already = lineup.findIndex(h => h?.id === id);
    const nl = [...lineup];
    if (already !== -1) nl[already] = null;
    nl[activeSlot] = hero;
    lineup = nl; activeSlot = null; render();
};
window.mxAddFromDB = function(id) {
    const hero = HEROES.find(h => h.id === id);
    if (!hero) return;
    const empty = lineup.findIndex(s => s === null);
    if (empty === -1) { mxToast('All 5 slots filled — remove a hero first'); return; }
    lineup[empty] = hero;
    mxSwitchTab('builder', document.querySelectorAll('.manxeon-tab-btn')[0]);
    render();
    mxToast(`${hero.name} added to slot ${empty + 1}`);
};
window.mxLoadTemplate = function(idsStr) {
    const ids = idsStr.split(',');
    const nl = [null, null, null, null, null];
    ids.map(id => HEROES.find(h => h.id === id)).filter(Boolean).forEach((h, i) => nl[i] = h);
    lineup = nl;
    mxSwitchTab('builder', document.querySelectorAll('.manxeon-tab-btn')[0]);
    render(); mxToast('Template loaded!');
};
window.mxSetSearch = function(v) {
    searchQ = v;
    if (currentTab === 'database') renderDatabase();
    else render();
};
window.mxSetRole = function(r) {
    roleFilter = r;
    if (currentTab === 'database') renderDatabase();
    else render();
};
window.mxToggleExpand = function(id) {
    expandedHero = expandedHero === id ? null : id;
    renderDatabase();
};
window.mxSwitchTab = function(name, btn) {
    currentTab = name;
    document.querySelectorAll('.manxeon-tab-btn').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
    ['builder', 'templates', 'database', 'items', 'vs'].forEach(t => {
        const el = document.getElementById(`mx-tab-${t}`);
        if (el) el.style.display = t === name ? 'block' : 'none';
    });
    if (name === 'templates') renderTemplates();
    if (name === 'database') renderDatabase();
    if (name === 'items') renderItems();
    if (name === 'vs') renderVsMode();
};

function mxToast(msg) {
    const old = document.querySelector('.mx-toast');
    if (old) old.remove();
    const el = document.createElement('div');
    el.className = 'mx-toast';
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2200);
}

var ITEMS_CAT_COLOR = {
  Attack:'#ef4444', Magic:'#a855f7', Defense:'#3b82f6',
  Movement:'#22c55e', Jungling:'#f59e0b', Roaming:'#06b6d4'
};

function renderItems() {
    const el = document.getElementById('mx-tab-items');
    if (!el) return;

    const cats = ['All','Attack','Magic','Defense','Movement','Jungling','Roaming'];
    const tierFilters = ['All','T1','T2','T3'];

    if (!window._itemFilter) window._itemFilter = 'All';
    if (!window._itemTier) window._itemTier = 'All';
    if (!window._itemSearch) window._itemSearch = '';

    const filtered = MLBB_ITEMS.filter(it => {
        const mCat = window._itemFilter === 'All' || it.cat === window._itemFilter;
        const mTier = window._itemTier === 'All' || it.tier === window._itemTier;
        const mSearch = !window._itemSearch || it.name.toLowerCase().includes(window._itemSearch.toLowerCase()) || (it.passive||'').toLowerCase().includes(window._itemSearch.toLowerCase());
        return mCat && mTier && mSearch;
    });

    const catBtns = cats.map(c => {
        const col = c === 'All' ? '#111' : (ITEMS_CAT_COLOR[c]||'#111');
        const active = window._itemFilter === c;
        return `<button onclick="mxSetItemFilter('${c}')" style="padding:6px 12px;font-size:11px;font-weight:700;border:1.5px solid ${active?col:'#d9d9d9'};border-radius:6px;background:${active?col:'#fff'};color:${active?'#fff':'#555'};cursor:pointer;font-family:Arial,sans-serif">${c}${c!=='All'?` <span style="font-size:9px;opacity:.7">${MLBB_ITEMS.filter(i=>i.cat===c).length}</span>`:''}</button>`;
    }).join('');

    const tierBtns = tierFilters.map(t => {
        const active = window._itemTier === t;
        return `<button onclick="mxSetItemTier('${t}')" style="padding:5px 10px;font-size:10px;font-weight:700;border:1.5px solid ${active?'#111':'#d9d9d9'};border-radius:4px;background:${active?'#111':'#fff'};color:${active?'#fff':'#555'};cursor:pointer;font-family:Arial,sans-serif">${t}</button>`;
    }).join('');

    const itemCards = filtered.map(it => {
        const col = ITEMS_CAT_COLOR[it.cat] || '#999';
        const tierBg = it.tier==='T3'?'#111':it.tier==='T2'?'#555':'#999';
        return `<div style="background:#fafafa;border:1px solid #e5e5e5;border-radius:8px;padding:12px;display:flex;flex-direction:column;gap:4px;border-left:3px solid ${col}">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2px">
                <span style="font-size:12px;font-weight:800;color:#111;font-family:Arial,sans-serif">${it.name}</span>
                <div style="display:flex;gap:4px;align-items:center">
                    <span style="font-size:8px;font-weight:700;padding:1px 5px;border-radius:2px;background:${tierBg};color:#fff;font-family:Arial,sans-serif">${it.tier}</span>
                    <span style="font-size:8px;font-weight:700;padding:1px 6px;border-radius:2px;background:${col}22;color:${col};border:1px solid ${col}44;font-family:Arial,sans-serif">${it.cat}</span>
                    ${it.cost>0?`<span style="font-size:9px;font-weight:700;color:#f59e0b;font-family:Arial,sans-serif">&#9670; ${it.cost}</span>`:''}
                </div>
            </div>
            <div style="font-size:10px;font-weight:700;color:#555;font-family:Arial,sans-serif">${it.stats}</div>
            ${it.passive?`<div style="font-size:10px;color:#333;line-height:1.5;font-family:Arial,sans-serif"><span style="font-weight:800;color:${col}">Passive: </span>${it.passive}</div>`:''}
            ${it.note?`<div style="font-size:9px;color:#888;font-style:italic;border-top:1px solid #f0f0f0;padding-top:3px;margin-top:2px;font-family:Arial,sans-serif">${it.note}</div>`:''}
        </div>`;
    }).join('');

    el.innerHTML = `
        <div style="margin-bottom:14px">
            <div style="font-size:11px;color:#888;margin-bottom:10px;font-family:Arial,sans-serif">
                &#9670; <strong style="color:#111">104 Items</strong> · Patch 2.1.70 · Source: mlbbhub.com · 6 categories · T1/T2/T3 tiers
            </div>
            <input type="text" placeholder="Search items or passives..." value="${window._itemSearch}"
                oninput="window._itemSearch=this.value;renderItems()"
                style="width:100%;padding:10px 12px;font-family:Arial,sans-serif;font-size:13px;border:1px solid #d9d9d9;border-radius:8px;outline:none;margin-bottom:10px">
            <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">${catBtns}</div>
            <div style="display:flex;gap:5px;flex-wrap:wrap;align-items:center">
                <span style="font-family:Arial,sans-serif;font-size:10px;color:#888">Tier:</span>
                ${tierBtns}
                <span style="font-family:Arial,sans-serif;font-size:10px;color:#aaa;margin-left:8px">${filtered.length} items shown</span>
            </div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px">
            ${itemCards || '<div style="color:#aaa;font-family:Arial,sans-serif;font-size:13px;padding:20px;text-align:center">No items match filter.</div>'}

        <div style="margin-top:16px;padding:10px 14px;background:#f9f9f9;border:1px solid #e5e5e5;border-radius:8px;font-size:10px;color:#aaa;font-family:Arial,sans-serif;line-height:1.7">
            <strong style="color:#555">Data Source:</strong> Item stats verified from mlbbhub.com/items · Patch 2.1.70 · 104 total items across 6 categories.
            Anti-heal items: Dominance Ice (tank), Sea Halberd (physical), Necklace of Durance (magic), Glowing Wand (magic burn).
        </div>`;
}

window.mxSetItemFilter = function(f) { window._itemFilter = f; renderItems(); };
window.mxSetItemTier = function(t) { window._itemTier = t; renderItems(); };

function generateGameplan(heroes, teamColor) {
    if (!heroes || heroes.length < 3) return null;
    const fc = forecast(heroes);
    if (!fc) return null;

    const isBlue = teamColor === 'blue';
    const borderCol = isBlue ? '#3b82f6' : '#dc2626';
    const headerBg  = isBlue ? '#eff6ff' : '#fef2f2';
    const accentCol = isBlue ? '#1d4ed8' : '#dc2626';
    const teamName  = isBlue ? 'BLUE' : 'RED';

    
    const tank     = heroes.filter(h=>h.role==='Tank');
    const fighters = heroes.filter(h=>h.role==='Fighter');
    const mages    = heroes.filter(h=>h.role==='Mage');
    const marksmen = heroes.filter(h=>h.role==='Marksman');
    const assassins= heroes.filter(h=>h.role==='Assassin');
    const supports = heroes.filter(h=>h.role==='Support');
    const frontline= [...tank,...fighters];
    const carries  = [...marksmen,...mages,...assassins];
    const hasFront = frontline.length > 0;
    const hasSupport = supports.length > 0;

    
    let archetype = 'Balanced';
    let archetypeColor = '#7c3aed';
    if (fc.avgEarly >= 4 && fc.avgLate < 4) { archetype = 'Early Snowball'; archetypeColor='#f59e0b'; }
    else if (fc.avgLate >= 4.5)              { archetype = 'Late Scaling';   archetypeColor='#3b82f6'; }
    else if (fc.avgTF >= 4.5)               { archetype = 'Teamfight AoE';  archetypeColor='#a855f7'; }
    else if (fc.ccCount >= 4)               { archetype = 'CC Chain';       archetypeColor='#22c55e'; }
    else if (fc.phys >= 4)                  { archetype = 'Physical Burst';  archetypeColor='#f97316'; }
    else if (fc.mag >= 4)                   { archetype = 'Magic Burst';     archetypeColor='#a855f7'; }
    else if (!hasFront)                     { archetype = 'Poke & Siege';    archetypeColor='#06b6d4'; }

    
    const earlyPlan = buildEarlyPlan(heroes, frontline, carries, supports, archetype, fc);
    const midPlan   = buildMidPlan(heroes, frontline, carries, supports, archetype, fc);
    const latePlan  = buildLatePlan(heroes, frontline, carries, supports, archetype, fc);

    
    const combos = buildCombos(heroes, fc);

    
    const counterTips = buildCounterTips(heroes);

    
    const itemTips = buildItemTips(heroes, fc);

    return `
    <div style="margin-top:16px;background:#fff;border:2px solid ${borderCol};border-radius:10px;overflow:hidden;font-family:Arial,sans-serif">

        <!-- Header -->
        <div style="background:${headerBg};padding:12px 16px;border-bottom:1px solid ${borderCol}22;display:flex;align-items:center;justify-content:space-between">
            <div>
                <div style="font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:${accentCol}">&#9658; ${teamName} TEAM GAMEPLAN</div>
                <div style="font-size:13px;font-weight:800;color:#111;margin-top:2px">${heroes.map(h=>h.name).join(' · ')}</div>
            </div>
            <div style="text-align:right">
                <div style="font-size:10px;padding:3px 10px;border-radius:12px;font-weight:800;background:${archetypeColor}22;color:${archetypeColor};border:1px solid ${archetypeColor}44">${archetype}</div>
                <div style="font-size:18px;font-weight:900;color:${fc.lc};margin-top:3px">${fc.fc}% <span style="font-size:9px;color:#aaa;font-weight:400">FORECAST WR</span></div>
            </div>
        </div>

        <!-- Phase Plans -->
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;border-bottom:1px solid #f0f0f0">
            ${phaseBox('EARLY GAME', earlyPlan, fc.avgEarly, '#f59e0b', '0-5 min')}
            ${phaseBox('MID GAME', midPlan, (fc.avgEarly+fc.avgLate)/2, '#7c3aed', '5-15 min')}
            ${phaseBox('LATE GAME', latePlan, fc.avgLate, '#3b82f6', '15+ min')}
        </div>

        <!-- Key Combos -->
        ${combos.length ? `
        <div style="padding:12px 16px;border-bottom:1px solid #f0f0f0">
            <div style="font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#888;margin-bottom:8px">&#9889; KEY COMBOS</div>

                <strong style="color:#b45309">${c.title}</strong><br>${c.desc}
            </div>`).join('')}
        </div>` : ''}

        <!-- Item Priorities -->
        <div style="padding:12px 16px;border-bottom:1px solid #f0f0f0">
            <div style="font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#888;margin-bottom:8px">&#9670; PRIORITY ITEMS</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
                ${itemTips.map(it=>`<div style="padding:6px 9px;background:#f9fafb;border:1px solid #e5e7eb;border-radius:4px;font-size:10px;color:#555;line-height:1.5">
                    <strong style="color:#111">${it.hero}</strong> → ${it.items}
                </div>`).join('')}
            </div>

        <!-- Counter Tips -->
        ${counterTips.length ? `

        </div>` : ''}

function phaseBox(title, plan, rating, color, timeRange) {
    const bars = Math.round(rating);
    const barHTML = Array.from({length:5},(_,i)=>`<span style="display:inline-block;width:8px;height:8px;border-radius:1px;background:${i<bars?color:'#e5e5e5'};margin-right:2px"></span>`).join('');
    return `<div style="padding:10px 12px;border-right:1px solid #f0f0f0">
        <div style="font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:${color};margin-bottom:2px">${title}</div>
        <div style="font-size:8px;color:#aaa;margin-bottom:5px">${timeRange} · ${barHTML}</div>
        <div style="font-size:10px;color:#333;line-height:1.6">${plan}</div>
    </div>`;
}

function buildEarlyPlan(heroes, frontline, carries, supports, archetype, fc) {
    const parts = [];
    if (archetype === 'Early Snowball') {
        parts.push('Invade enemy jungle at 0:00 with full team. Deny first buff.');
    } else if (supports.length) {
        parts.push(`${supports[0].name} roams to Gold lane at lv.2 for first blood setup.`);
    }
    if (frontline.length) {
        parts.push(`${frontline[0].name} controls river vision and secures first turtle priority.`);
    }
    const junglers = heroes.filter(h=>(h.lane||[]).includes('Jungle'));
    if (junglers.length) {
        parts.push(`${junglers[0].name} clears towards enemy side post lv.4 power spike.`);
    }
    if (fc.avgEarly < 3) parts.push('Play defensively — avoid early trades. Farm to item spikes.');
    return parts.slice(0,2).join(' ') || 'Secure early objectives and prioritise safe farming.';
}

function buildMidPlan(heroes, frontline, carries, supports, archetype, fc) {
    const parts = [];
    const hasTurtle = fc.avgTF >= 4;
    if (hasTurtle) parts.push('Group for every Turtle spawn. Rotate as 4-1 or 3-2 split.');
    if (archetype === 'CC Chain') {
        parts.push('Wait for grouped enemies near objectives. Chain CC in sequence for instant picks.');
    } else if (archetype === 'Teamfight AoE') {
        parts.push('Force 5v5 around Lord pit. Full AoE rotation wipes enemy team.');
    } else if (carries.length >= 2) {
        parts.push(`${carries[0].name} must reach 2 core items before joining fights.`);
    }
    if (frontline.length && carries.length) {
        parts.push(`${frontline[0].name} engages → ${carries[0].name} follows with burst.`);
    }
    return parts.slice(0,2).join(' ') || 'Contest all Turtles and apply mid-lane pressure.';
}

function buildLatePlan(heroes, frontline, carries, supports, archetype, fc) {
    const parts = [];
    if (fc.avgLate >= 4.5) {
        parts.push('Stall until 3-4 core items. Never split: fight as 5 every Lord spawn.');
    } else if (fc.avgLate < 3) {
        parts.push('Must close before 18min. Use Lord buff to end immediately after taking it.');
    }
    if (supports.length) {
        parts.push(`${supports[0].name} stays attached to main carry at all times in late teamfights.`);
    }
    if (archetype === 'Late Scaling') {
        parts.push('Defend patiently. Your peak is 3 items — their power fades while yours grows.');
    }
    const highLate = heroes.filter(h=>h.lateGame>=5);
    if (highLate.length) {
        parts.push(`${highLate.map(h=>h.name).join(' & ')} scale exceptionally — protect them to full build.`);
    }
    return parts.slice(0,2).join(' ') || 'Group for Lord, take objectives, push to end.';
}

function buildCombos(heroes, fc) {
    const combos = [];
    const hNames = heroes.map(h=>h.id);

    // Franco + Gord/Valir/Eudora
    if (hNames.includes('franco')) {
        const burst = heroes.find(h=>['gord','valir','eudora','kadita','zetian'].includes(h.id));
        if (burst) combos.push({
            title: `Franco Hook → ${burst.name} burst`,
            desc: `Franco hooks a squishy target. ${burst.name} immediately full-channels their damage combo. Target eliminated before CC expires.`
        });
    }
    // Atlas + AoE mage
    if (hNames.includes('atlas')) {
        const mage = heroes.find(h=>h.role==='Mage'&&h.id!=='atlas');
        if (mage) combos.push({
            title: `Atlas Fatal Links → ${mage.name} AoE`,
            desc: `Atlas links 3+ enemies and Ult pulls them together. ${mage.name} unleashes full AoE damage on clustered targets. Instant team wipe potential.`
        });
    }
    // Kaja + burst
    if (hNames.includes('kaja')) {
        const burst = heroes.find(h=>h.burst>=5&&h.id!=='kaja');
        if (burst) combos.push({
            title: `Kaja Ult suppress → ${burst.name}`,
            desc: `Kaja silences and drags the enemy carry to your team. ${burst.name} instantly bursts the isolated target.`
        });
    }
    // Minsitthar + mage
    if (hNames.includes('minsitthar')) {
        const mage = heroes.find(h=>h.role==='Mage');
        if (mage) combos.push({
            title: `Minsitthar Spear Field → ${mage?mage.name:'team"}`,
            desc: `Minsitthar spear field suppresses all blink skills. Enemy team is grounded. ${mage?mage.name+" channels full damage safely.':'Your team cleanly executes.'}` 
        });
    }
    // Diggie + any teamfight
    if (hNames.includes('diggie')) {
        const tf = heroes.find(h=>h.teamfight>=5&&h.id!=='diggie');
        if (tf) combos.push({
            title: `Diggie Ult → ${tf?tf.name:'team'} freely engage`,
            desc: `Activate Diggie Ult before enemy AoE CC lands. Your team is CC-immune. ${tf?tf.name+' walks into the enemy team without fear.':'Walk in and execute freely.'}`
        });
    }
    // Synergy pair combos
    if (fc.synHits.length) {
        fc.synHits.slice(0,2).forEach(s=>{
            if (!combos.find(c=>c.title.includes(s.pair.split(' + ')[0]))) {
                combos.push({
                    title: `${s.pair} Synergy (${s.val}/10)`,
                    desc: `Confirmed high-synergy pair. Position these two together in every teamfight for maximum combined output.`
                });
            }
        });
    }
    return combos.slice(0,3);
}

function buildCounterTips(heroes) {
    const tips = [];
    const allCounters = heroes.flatMap(h=>h.counters||[]);
    const counterFreq = {};
    allCounters.forEach(c=>{ counterFreq[c]=(counterFreq[c]||0)+1; });
    const topCounters = Object.entries(counterFreq).sort((a,b)=>b[1]-a[1]).slice(0,3);
    topCounters.forEach(([name, count])=>{
        if (count >= 2) tips.push(`<strong>${name}</strong> counters ${count} heroes on your team — ban priority or adjust if enemy picks ${name}.`);
        else tips.push(`Watch out for <strong>${name}</strong> — hard counter to ${heroes.filter(h=>(h.counters||[]).includes(name)).map(h=>h.name).join(', ')}.`);
    });
    // Anti-heal warning
    const healers = heroes.filter(h=>h.sustain>=5||['estes','floryn','angela','rafaela'].includes(h.id));
    if (healers.length) tips.push(`Enemy will likely build <strong>Dominance Ice / Sea Halberd</strong> vs your ${healers.map(h=>h.name).join('/')} healing. Fight quickly before they item up.`);
    return tips.slice(0,3);
}

function buildItemTips(heroes, fc) {
    const tips = [];
    heroes.forEach(h => {
        const role = h.role;
        let items = '';
        if (role==='Marksman') {
            items = fc.phys >= 3 ? "Windtalker → Berserkers Fury → Malefic Roar" : 'Corrosion Scythe → Demon Hunter → Sea Halberd';
        } else if (role==='Mage') {
            items = 'Genius Wand → Holy Crystal → Divine Glaive';
        } else if (role==='Tank') {
            items = fc.mag >= 3 ? "Athenas Shield → Oracle → Dominance Ice" : 'Antique Cuirass → Dominance Ice → Immortality';
        } else if (role==='Fighter') {
            items = h.sustain >= 4 ? 'War Axe → Endless Battle → Immortality' : 'Hunter Strike → Blade of Despair → Malefic Roar';
        } else if (role==='Assassin') {
            items = 'Hunter Strike → Blade of Despair → Malefic Roar';
        } else if (role==='Support') {
            items = 'Courage Boots → Oracle → Immortality';
        }
        if (items) tips.push({ hero: h.name, items });
    });
    return tips;
}

function vsWinBar(blueFc, redFc, winner) {
    const total = blueFc + redFc;
    const bluePct = Math.round(blueFc / total * 100);
    const redPct  = 100 - bluePct;
    const diff = Math.abs(blueFc - redFc).toFixed(1);
    return `
        <div style="margin-bottom:16px;padding:12px;background:#fafafa;border:1px solid #e5e5e5;border-radius:8px">
            <div style="display:flex;justify-content:space-between;font-size:10px;font-weight:700;margin-bottom:6px;font-family:Arial,sans-serif">
                <span style="color:#1d4ed8">BLUE ${bluePct}%</span>
                <span style="color:#666;font-size:9px">WIN PROBABILITY · ${diff}% advantage to ${winner==='tie'?'NEITHER':winner.toUpperCase()}</span>
                <span style="color:#dc2626">RED ${redPct}%</span>
            </div>
            <div style="height:10px;border-radius:5px;overflow:hidden;display:flex">
                <div style="width:${bluePct}%;background:linear-gradient(90deg,#1d4ed8,#3b82f6);transition:width .5s ease"></div>
                <div style="width:${redPct}%;background:linear-gradient(90deg,#ef4444,#dc2626);transition:width .5s ease"></div>
            </div>
            ${winner && winner!=='tie' ? `<div style="text-align:center;margin-top:6px;font-size:11px;font-weight:800;color:${winner==='blue'?'#1d4ed8':'#dc2626'};letter-spacing:1px;font-family:Arial,sans-serif">&#9650; ${winner.toUpperCase()} TEAM FAVOURED</div>` : ''}
        </div>`;
}

function vsPickerHTML() {
    const team = vsActiveTeam;
    const slot = vsActiveSlot;
    const lane = VS_LANES[slot];
    const teamColor = team === 'blue' ? '#3b82f6' : '#dc2626';
    const teamBg    = team === 'blue' ? '#eff6ff' : '#fef2f2';

    const vh = HEROES.filter(h => {
        const mRole = vsRoleFilter==='All' ? true : h.role===vsRoleFilter;
        const mSearch = !vsSearchQ || h.name.toLowerCase().includes(vsSearchQ.toLowerCase());
        return mRole && mSearch;
    }).sort((a,b) => {

        const bf = (VS_LANE_ROLES[lane]||[]).some(r=>b.role===r) ? 0 : 1;
        if (af!==bf) return af-bf;
        return b.wr-a.wr;
    });

    const roleBtns = ['All','Tank','Fighter','Mage','Marksman','Assassin','Support'].map(r =>
        `<button onclick="vsSetRole('${r}')" style="padding:5px 9px;font-size:10px;font-weight:700;border:1.5px solid ${vsRoleFilter===r?teamColor:'#d9d9d9'};border-radius:4px;background:${vsRoleFilter===r?teamColor:'#fff'};color:${vsRoleFilter===r?'#fff':'#666'};cursor:pointer;font-family:Arial,sans-serif">${r}</button>`
    ).join('');

    const cards = vh.map(hero => {

}

function vsForecastComparison(blueFc, redFc, winner) {
    function barRow(label, blueVal, redVal, max, blueColor, redColor) {
        const bpct = Math.max(2, Math.round(blueVal/max*100));
        const rpct = Math.max(2, Math.round(redVal/max*100));
        const bv = typeof blueVal==='number'&&blueVal%1!==0 ? blueVal.toFixed(1) : blueVal;
        const rv = typeof redVal==='number'&&redVal%1!==0 ? redVal.toFixed(1) : redVal;
        const bWins = parseFloat(blueVal) > parseFloat(redVal);
        const rWins = parseFloat(redVal) > parseFloat(blueVal);
        return `<div style="margin-bottom:10px">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
                <span style="font-size:10px;font-weight:800;color:${bWins?'#1d4ed8':'#888'}">${bv}</span>
                <span style="font-size:9px;font-weight:700;color:#aaa;letter-spacing:1px;text-transform:uppercase">${label}</span>
                <span style="font-size:10px;font-weight:800;color:${rWins?'#dc2626':'#888'}">${rv}</span>
            </div>
            <div style="display:grid;grid-template-columns:1fr 8px 1fr;gap:2px;align-items:center">
                <div style="height:8px;background:#f0f0f0;border-radius:4px;overflow:hidden;display:flex;justify-content:flex-end">
                    <div style="width:${bpct}%;height:100%;background:${blueColor};border-radius:4px;transition:width .4s ease"></div>
                </div>
                <div></div>
                <div style="height:8px;background:#f0f0f0;border-radius:4px;overflow:hidden">
                    <div style="width:${rpct}%;height:100%;background:${redColor};border-radius:4px;transition:width .4s ease"></div>
                </div>
            </div>
        </div>`;
    }

    const synBlue = getSynergy(vsLineup.blue.filter(Boolean));
    const synRed  = getSynergy(vsLineup.red.filter(Boolean));

    return `<div style="background:#fafafa;border:1px solid #e5e5e5;border-radius:8px;padding:14px;margin-bottom:14px" id="vs-forecast-card">
        <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:8px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid #f0f0f0">
            <div style="text-align:left">
                <div style="font-size:10px;font-weight:700;letter-spacing:1px;color:#1d4ed8;text-transform:uppercase;margin-bottom:4px">BLUE TEAM</div>
                ${blueFc.pros.slice(0,3).map(p=>`<div style="font-size:9px;color:#555;margin-bottom:2px;font-family:Arial,sans-serif">&#10003; ${p}</div>`).join('')}
                ${blueFc.warnings.slice(0,2).map(w=>`<div style="font-size:9px;color:#f59e0b;margin-bottom:2px">&#9888; ${w}</div>`).join('')}
            </div>
            <div style="width:1px;background:#e5e5e5"></div>
            <div style="text-align:right">
                <div style="font-size:10px;font-weight:700;letter-spacing:1px;color:#dc2626;text-transform:uppercase;margin-bottom:4px">RED TEAM</div>
                ${redFc.pros.slice(0,3).map(p=>`<div style="font-size:9px;color:#555;margin-bottom:2px;font-family:Arial,sans-serif">${p} &#10003;</div>`).join('')}
                ${redFc.warnings.slice(0,2).map(w=>`<div style="font-size:9px;color:#f59e0b;margin-bottom:2px">${w} &#9888;</div>`).join('')}
            </div>
        </div>
        <div style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#888;margin-bottom:10px;text-align:center">STAT COMPARISON</div>
        ${barRow('WIN RATE', blueFc.baseWR, redFc.baseWR, 70, '#3b82f6', '#ef4444')}
        ${barRow('EARLY GAME', blueFc.avgEarly, redFc.avgEarly, 5, '#f59e0b', '#f97316')}
        ${barRow('LATE GAME', blueFc.avgLate, redFc.avgLate, 5, '#3b82f6', '#ef4444')}
        ${barRow('TEAMFIGHT', blueFc.avgTF, redFc.avgTF, 5, '#7c3aed', '#a855f7')}
        ${barRow('CC COUNT', blueFc.ccCount, redFc.ccCount, 5, '#22c55e', '#ef4444')}
        ${barRow('SYNERGY', synBlue.score, synRed.score, 60, '#06b6d4', '#f97316')}
        ${barRow('PHYS DMG', blueFc.phys, redFc.phys, 5, '#f97316', '#ef4444')}
        ${barRow('MAGIC DMG', blueFc.mag, redFc.mag, 5, '#a855f7', '#7c3aed')}
        <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid #f0f0f0">
            <div style="font-size:20px;font-weight:900;color:#1d4ed8;text-align:left">${blueFc.fc}%<div style="font-size:9px;font-weight:700;color:#aaa;margin-top:1px">FORECAST WR</div></div>
            <div style="font-size:10px;font-weight:900;text-align:center;color:${winner==='tie'?'#888':winner==='blue'?'#1d4ed8':'#dc2626'};align-self:center;letter-spacing:.5px">${winner==='tie'?'EVEN':winner==='blue'?'&#9650; BLUE':'&#9650; RED'}</div>
            <div style="font-size:20px;font-weight:900;color:#dc2626;text-align:right">${redFc.fc}%<div style="font-size:9px;font-weight:700;color:#aaa;margin-top:1px">FORECAST WR</div></div>
        </div>
    </div>
    ${generateGameplan(vsLineup.blue.filter(Boolean), 'blue') || ''}
    ${generateGameplan(vsLineup.red.filter(Boolean), 'red') || ''}
    `;
}

        vsActiveTeam=null; vsActiveSlot=null;
    } else {
        vsActiveTeam=team; vsActiveSlot=slot;
        vsSearchQ=''; vsRoleFilter='All';
    }
    renderVsMode();
};

window.vsCloseSlot = function() { vsActiveTeam=null; vsActiveSlot=null; renderVsMode(); };

window.vsRemove = function(e, team, slot) {
    e.stopPropagation();
    vsLineup[team][slot] = null;
    renderVsMode();
};

window.vsPickHero = function(id) {
    if (vsActiveTeam===null || vsActiveSlot===null) return;
    const hero = HEROES.find(h=>h.id===id);
    if (!hero) return;
    // Remove from both teams if already picked
    ['blue','red'].forEach(t => {
        const i = vsLineup[t].findIndex(h=>h&&h.id===id);
        if (i!==-1) vsLineup[t][i]=null;
    });
    vsLineup[vsActiveTeam][vsActiveSlot] = hero;
    // Auto-advance to next empty slot on same team
    const next = vsLineup[vsActiveTeam].findIndex((h,i)=>!h&&i>vsActiveSlot);
    if (next!==-1) { vsActiveSlot=next; }
    else { vsActiveTeam=null; vsActiveSlot=null; }
    renderVsMode();
};

window.vsSetRole = function(r) { vsRoleFilter=r; renderVsMode(); };

window.vsClearTeam = function(team) {
    vsLineup[team]=[null,null,null,null,null];
    if (vsActiveTeam===team) { vsActiveTeam=null; vsActiveSlot=null; }
    renderVsMode();
};

window.vsClearAll = function() {
    vsLineup={blue:[null,null,null,null,null],red:[null,null,null,null,null]};
    vsActiveTeam=null; vsActiveSlot=null;
    renderVsMode();
};

    const redFc  = forecast(red);

    const url = encodeURIComponent(window.location.href);

    const links = {
        facebook: `https://www.facebook.com/sharer/sharer.php?u=${url}&quote=${enc}`,

        threads:  `https://www.threads.net/intent/post?text=${enc}`,

window.vsSaveForecast = function() {
    const blue = vsLineup.blue.filter(Boolean);
    const red  = vsLineup.red.filter(Boolean);
    if (blue.length!==5||red.length!==5) { mxToast('Pick all 10 heroes first'); return; }

    const blueFc = forecast(blue);
    const redFc  = forecast(red);
    const winner = blueFc.fc>redFc.fc?'blue':redFc.fc>blueFc.fc?'red':'tie';

    const W=1200, H=700;
    const cv=document.createElement('canvas');
    cv.width=W; cv.height=H;
    const ctx=cv.getContext('2d');

    // Background
    ctx.fillStyle='#ffffff';
    ctx.fillRect(0,0,W,H);

    // Blue side bg
    ctx.fillStyle='rgba(59,130,246,0.05)';
    ctx.fillRect(0,0,W/2,H);

    // Red side bg
    ctx.fillStyle='rgba(220,38,38,0.05)';
    ctx.fillRect(W/2,0,W/2,H);

    // Center divider
    ctx.strokeStyle='#e5e5e5';
    ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(W/2,0); ctx.lineTo(W/2,H); ctx.stroke();

    // Top bar
    const grad=ctx.createLinearGradient(0,0,W,0);
    grad.addColorStop(0,'#1d4ed8');
    grad.addColorStop(0.5,'#111');
    grad.addColorStop(1,'#dc2626');
    ctx.fillStyle=grad;
    ctx.fillRect(0,0,W,4);

    // Title
    ctx.fillStyle='#111';
    ctx.font='bold 20px Arial';
    ctx.textAlign='center';
    ctx.fillText('MLBB HEROES DRAFT BUILDER — VS FORECAST', W/2, 32);

    ctx.font='11px Arial';
    ctx.fillStyle='#888';
    ctx.fillText('Patch 2.1.70 · Season 40', W/2, 50);

    // BLUE header
    ctx.font='bold 14px Arial';
    ctx.fillStyle='#1d4ed8';
    ctx.textAlign='center';
    ctx.fillText('BLUE TEAM', W/4, 74);
    ctx.font='bold 32px Arial';
    ctx.fillText(blueFc.fc+'%', W/4, 108);
    ctx.font='bold 12px Arial';
    ctx.fillStyle=blueFc.fc>redFc.fc?'#16a34a':'#888';
    ctx.fillText(blueFc.lbl, W/4, 126);

    // RED header
    ctx.font='bold 14px Arial';
    ctx.fillStyle='#dc2626';
    ctx.textAlign='center';
    ctx.fillText('RED TEAM', 3*W/4, 74);
    ctx.font='bold 32px Arial';
    ctx.fillText(redFc.fc+'%', 3*W/4, 108);
    ctx.font='bold 12px Arial';
    ctx.fillStyle=redFc.fc>blueFc.fc?'#16a34a':'#888';
    ctx.fillText(redFc.lbl, 3*W/4, 126);

    // VS center
    ctx.font='bold 28px Arial';
    ctx.fillStyle='#111';
    ctx.fillText('VS', W/2, 106);

    // Win bar
    const total=blueFc.fc+redFc.fc;
    const bpct=blueFc.fc/total;
    const barY=140, barH=12;
    ctx.fillStyle='#3b82f6';
    ctx.beginPath();
    ctx.roundRect(60,barY,Math.round((W-120)*bpct),barH,4);
    ctx.fill();
    ctx.fillStyle='#dc2626';
    ctx.beginPath();
    ctx.roundRect(60+Math.round((W-120)*bpct),barY,Math.round((W-120)*(1-bpct)),barH,4);
    ctx.fill();

    // Winner label
    ctx.font='bold 11px Arial';
    ctx.textAlign='center';
    ctx.fillStyle=winner==='blue'?'#1d4ed8':winner==='red'?'#dc2626':'#888';
    ctx.fillText(winner==='tie'?'EVEN MATCHUP':winner.toUpperCase()+' FAVOURED by '+Math.abs(blueFc.fc-redFc.fc).toFixed(1)+'%', W/2, 168);

    // Hero portraits function (draw circle avatars)
    function drawHeroBox(hero, x, y, isBlue) {
        const imgs = typeof MANXEON_MLBB_IMAGES!=='undefined' ? MANXEON_MLBB_IMAGES : {};
        const url = imgs[hero.id]||'';
        const tc = TIER_C[hero.tier]||'#999';
        const rc = ROLE_COLOR[hero.role]||'#999';
        const cx = x+46; const cy = y+24;
        const r = 22;

        const drawCircle = () => {
            // Tier ring
            ctx.beginPath();
            ctx.arc(cx,cy,r+3,0,Math.PI*2);
            ctx.fillStyle=tc;
            ctx.fill();
            // Fill circle
            ctx.beginPath();
            ctx.arc(cx,cy,r,0,Math.PI*2);
            ctx.fillStyle=rc;
            ctx.fill();
            // Role text fallback
            ctx.font='bold 9px Arial';
            ctx.fillStyle='#fff';
            ctx.textAlign='center';
            ctx.textBaseline='middle';
            ctx.fillText(ROLE_ICON[hero.role]||'?', cx, cy);
            ctx.textBaseline='alphabetic';
        };

        if (url) {
            const img=new Image();
            img.crossOrigin='anonymous';
            img.onload=()=>{
                ctx.save();
                ctx.beginPath(); ctx.arc(cx,cy,r+3,0,Math.PI*2); ctx.fillStyle=tc; ctx.fill();
                ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.clip();
                ctx.drawImage(img, cx-r, cy-r, r*2, r*2);
                ctx.restore();
                afterDraw();
            };
            img.onerror=()=>{ drawCircle(); afterDraw(); };
            img.src=url;
        } else { drawCircle(); afterDraw(); }

        let drawn=false;
        function afterDraw() {
            if (drawn) return; drawn=true;
            // Name
            ctx.font='bold 10px Arial';
            ctx.fillStyle='#111';
            ctx.textAlign='center';
            ctx.fillText(hero.name.length>10?hero.name.slice(0,9)+'…':hero.name, x+46, y+54);
            // WR
            ctx.font='bold 9px Arial';
            ctx.fillStyle=hero.wr>=52?'#16a34a':hero.wr>=50?'#b45309':'#dc2626';
            ctx.fillText(hero.wr+'%', x+46, y+65);
        }
    }

    // Draw hero boxes
    const heroW=92, startY=185;
    blue.forEach((h,i) => drawHeroBox(h, 20+i*(heroW+4), startY, true));
    red.forEach((h,i)  => drawHeroBox(h, W/2+20+i*(heroW+4), startY, false));

    // Stat comparison bars
    const stats = [
        ['Base WR', blueFc.baseWR, redFc.baseWR, 70],
        ['Early Game', blueFc.avgEarly, redFc.avgEarly, 5],
        ['Late Game', blueFc.avgLate, redFc.avgLate, 5],
        ['Teamfight', blueFc.avgTF, redFc.avgTF, 5],
        ['CC Count', blueFc.ccCount, redFc.ccCount, 5],
    ];

    const statY=280;
    stats.forEach((s,i)=>{
        const [label, bv, rv, max] = s;
        const rowY = statY+i*44;
        const bw=Math.round((W/2-80)*(bv/max));
        const rw=Math.round((W/2-80)*(rv/max));

        ctx.font='9px Arial';
        ctx.fillStyle='#888';
        ctx.textAlign='center';
        ctx.fillText(label, W/2, rowY+12);

        // Blue bar (right-aligned from center)
        ctx.fillStyle='#3b82f6';
        ctx.beginPath();
        if(ctx.roundRect) ctx.roundRect(W/2-24-bw,rowY+16,bw,8,3);
        else ctx.rect(W/2-24-bw,rowY+16,bw,8);
        ctx.fill();

        // Red bar (left from center)
        ctx.fillStyle='#ef4444';
        ctx.beginPath();
        if(ctx.roundRect) ctx.roundRect(W/2+24,rowY+16,rw,8,3);
        else ctx.rect(W/2+24,rowY+16,rw,8);
        ctx.fill();

        // Values
        ctx.font='bold 10px Arial';
        ctx.fillStyle='#1d4ed8'; ctx.textAlign='right';
        ctx.fillText(typeof bv==='number'&&bv%1?bv.toFixed(1):bv, W/2-28, rowY+25);
        ctx.fillStyle='#dc2626'; ctx.textAlign='left';
        ctx.fillText(typeof rv==='number'&&rv%1?rv.toFixed(1):rv, W/2+28, rowY+25);
    });

    // Pros/cons summary
    const proY=510;
    ctx.font='bold 10px Arial';
    ctx.fillStyle='#1d4ed8'; ctx.textAlign='left';
    ctx.fillText('BLUE STRENGTHS', 30, proY);
    blueFc.pros.slice(0,3).forEach((p,i)=>{
        ctx.font='9px Arial'; ctx.fillStyle='#555';
        ctx.fillText('+ '+p.slice(0,52), 30, proY+16+i*16);
    });

    ctx.font='bold 10px Arial';
    ctx.fillStyle='#dc2626'; ctx.textAlign='right';
    ctx.fillText('RED STRENGTHS', W-30, proY);
    redFc.pros.slice(0,3).forEach((p,i)=>{
        ctx.font='9px Arial'; ctx.fillStyle='#555';
        ctx.textAlign='right';
        ctx.fillText('+'+p.slice(0,52), W-30, proY+16+i*16);
    });

    // Watermark
    ctx.font='9px Arial';
    ctx.fillStyle='#ccc';
    ctx.textAlign='center';
    ctx.fillText('MLBB Heroes Draft Builder · manxeon.com · Season 40 Patch 2.1.70', W/2, H-12);

    // Download after a short delay to let images load
    setTimeout(()=>{
        const link=document.createElement('a');
        link.download=`mlbb-vs-forecast-blue${blueFc.fc}-red${redFc.fc}.jpg`;
        cv.toBlob(blob=>{
            link.href=URL.createObjectURL(blob);
            link.click();
            setTimeout(()=>URL.revokeObjectURL(link.href),1000);
        },'image/jpeg',0.95);
        mxToast('VS Forecast saved as JPEG');
    }, 800);
};

// Poll until mx-main div exists, then init — works in all embed contexts

var _mlbbDone = false;
function _mlbbRun() {
    if (_mlbbDone) return;
    var el = document.getElementById('mx-main');
    if (!el) { setTimeout(_mlbbRun, 50); return; }
    _mlbbDone = true;
    try {
        applyData(FALLBACK_DATA);
        setStatus('green', 'Patch ' + (PATCH_INFO.patch||'2.1.70') + ' · ' + HEROES.length + ' heroes loaded');
        applyPatchBadge();
        renderApp();
    } catch(e) {
        var el2 = document.getElementById('mx-main');
        if (el2) el2.innerHTML = '<div style="padding:16px;font-family:Arial;color:#dc2626;border:1px solid #fecaca;border-radius:8px;background:#fef2f2"><strong>Error:</strong> ' + (e.message||'unknown') + '</div>';
        var sd = document.getElementById('mx-status-dot');
        var st = document.getElementById('mx-status-text');
        if (sd) sd.className = 'manxeon-status-dot red';
        if (st) st.textContent = 'Error: ' + (e.message||'failed');
    }
}

_mlbbRun();
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', _mlbbRun);
}
window.addEventListener('load', _mlbbRun);

if (typeof MutationObserver !== 'undefined') {
    var _mlbbObs = new MutationObserver(function() {
        if (!_mlbbDone && document.getElementById('mx-main')) {
            _mlbbObs.disconnect();
            _mlbbRun();
        }
    });
    _mlbbObs.observe(document.body || document.documentElement, { childList: true, subtree: true });
}
